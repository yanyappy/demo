<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Portfolio</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#achievements">Achievements</a></li>
            <li><a href="#contact">Contact</a></li>
            <li><button id="dark-mode-toggle">Toggle Dark Mode</button></li>
        </ul>
    </nav>
    <section id="hero">
        <h1>Welcome to My Portfolio</h1>
    </section>
    <section id="projects">
        <h2>Projects</h2>
        <!-- Project details here -->
    </section>
    <section id="skills">
        <h2>Skills</h2>
        <div class="skill-bar">
            <label for="skill1">HTML</label>
            <progress id="skill1" value="80" max="100"></progress>
        </div>
        <div class="skill-bar">
            <label for="skill2">CSS</label>
            <progress id="skill2" value="75" max="100"></progress>
        </div>
        <div class="skill-bar">
            <label for="skill3">JavaScript</label>
            <progress id="skill3" value="70" max="100"></progress>
        </div>
    </section>
    <section id="achievements">
        <h2>Achievements</h2>
        <!-- Achievements listing here -->
    </section>
    <section id="contact">
        <h2>Contact</h2>
        <!-- Contact form here -->
    </section>
    <footer>
        <div class="social-links">
            <a href="https://github.com/yanyappy">GitHub</a>
            <a href="https://linkedin.com/in/yanyappy">LinkedIn</a>
        </div>
        <div class="statistics">
            <p>Total Projects: 10</p>
            <p>Total Skills: 5</p>
            <p>Total Achievements: 3</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
